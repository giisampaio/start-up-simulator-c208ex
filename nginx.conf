server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # compressão
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml application/manifest+json;

    # assets com hash no nome: cache longo e imutável
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # service worker e manifest: sempre revalidar (para pegar atualizações)
    location = /sw.js              { add_header Cache-Control "no-cache"; }
    location = /manifest.webmanifest { add_header Cache-Control "no-cache"; }

    # app de página única
    location / {
        try_files $uri $uri/ /index.html;
    }
}
